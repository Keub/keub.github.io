<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect to index.html preserving the full query string and path
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin +
        window.location.pathname.replace(/\/[^/]*$/, '/') +
        (search ? search : '') +
        (hash ? hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
