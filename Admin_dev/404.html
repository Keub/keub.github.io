<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var seg   = window.location.pathname.split('/').slice(0, 2).join('/');
      var rest  = window.location.pathname.slice(seg.length);
      var query = window.location.search;
      var hash  = window.location.hash;
      window.location.replace(
        window.location.origin + seg + '/#' + rest + query + hash
      );
    </script>
  </head>
  <body></body>
</html>
